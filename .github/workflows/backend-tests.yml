name: Backend Tests

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    name: Backend Tests (path-filtered)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        env:
          OLLAMA_BASE_URL: "http://localhost:11434"
          CHROMA_PATH: "/tmp/test_chroma"
          CORS_ORIGIN: "chrome-extension://test"
          DEFAULT_MODEL: "llama3.2:3b"

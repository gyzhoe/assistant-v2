name: Backend Tests

on:
  push:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    name: Backend Tests (path-filtered)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
        env:
          LLM_BASE_URL: "http://localhost:11435"
          EMBED_BASE_URL: "http://localhost:11436"
          CHROMA_PATH: "/tmp/test_chroma"
          CORS_ORIGIN: "chrome-extension://test"
          DEFAULT_MODEL: "qwen3.5:9b"

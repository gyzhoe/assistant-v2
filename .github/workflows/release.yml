name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Zip extension artifact
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          cd extension/dist
          zip -r "../../assistant-extension-${TAG}.zip" .
          echo "ARTIFACT=assistant-extension-${TAG}.zip" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true
          body: |
            ## AI Helpdesk Assistant ${{ github.ref_name }}

            ### Installation
            1. Download `assistant-extension-*.zip` below
            2. Extract to a local folder
            3. Open Edge → `edge://extensions` → Enable Developer mode
            4. Click "Load unpacked" and select the extracted folder
            5. Ensure the Python backend is running: `uv run uvicorn app.main:app --port 8765`

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  # Job 1: Build the extension on Ubuntu (fast, has Node)
  extension-build:
    name: Build Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build --workspace=extension

      - name: Upload extension dist
        uses: actions/upload-artifact@v6
        with:
          name: extension-dist
          path: extension/dist/

  # Job 2: Build the Inno Setup installer on Windows
  build-installer:
    name: Build Windows Installer
    runs-on: windows-latest
    needs: extension-build
    steps:
      - uses: actions/checkout@v6

      - name: Download extension dist
        uses: actions/download-artifact@v7
        with:
          name: extension-dist
          path: extension/dist/

      - name: Download Ollama installer
        shell: pwsh
        run: |
          # Ollama v0.17.0 — pinned 2026-02-26
          # SHA256 sourced from: https://github.com/ollama/ollama/releases/download/v0.17.0/sha256sum.txt
          $ollamaVersion = "v0.17.0"
          $ollamaUrl = "https://github.com/ollama/ollama/releases/download/${ollamaVersion}/OllamaSetup.exe"
          $ollamaSha256 = "beea6a1e5eb7658ef0ad7789295f310ef59dc4c7e7d3651d03993bf3a4687e3e"

          New-Item -ItemType Directory -Force -Path installer/deps | Out-Null
          Write-Host "Downloading Ollama ${ollamaVersion}..."
          Invoke-WebRequest -Uri $ollamaUrl -OutFile "installer/deps/OllamaSetup.exe"

          $actual = (Get-FileHash -Path "installer/deps/OllamaSetup.exe" -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $ollamaSha256) {
            Write-Error "Ollama SHA256 mismatch! Expected: $ollamaSha256 | Got: $actual"
            exit 1
          }
          Write-Host "Ollama SHA256 verified OK"
          $size = [math]::Round((Get-Item installer/deps/OllamaSetup.exe).Length / 1MB, 1)
          Write-Host "Ollama installer: $size MB"

      - name: Download uv standalone
        shell: pwsh
        run: |
          # uv v0.10.6 — pinned 2026-02-26
          # SHA256 sourced from: https://github.com/astral-sh/uv/releases/download/0.10.6/uv-x86_64-pc-windows-msvc.zip.sha256
          $uvVersion = "0.10.6"
          $uvUrl = "https://github.com/astral-sh/uv/releases/download/${uvVersion}/uv-x86_64-pc-windows-msvc.zip"
          $uvSha256 = "b27eb789f281e398a82197477de727fc8faf08605152115686da2c3cba0d25f7"

          Write-Host "Downloading uv ${uvVersion}..."
          Invoke-WebRequest -Uri $uvUrl -OutFile "installer/deps/uv.zip"

          $actual = (Get-FileHash -Path "installer/deps/uv.zip" -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $uvSha256) {
            Write-Error "uv SHA256 mismatch! Expected: $uvSha256 | Got: $actual"
            exit 1
          }
          Write-Host "uv SHA256 verified OK"

          Expand-Archive -Path "installer/deps/uv.zip" -DestinationPath "installer/deps/uv-extract" -Force
          # uv.exe may be nested inside a directory
          $uvExe = Get-ChildItem -Path "installer/deps/uv-extract" -Recurse -Filter "uv.exe" | Select-Object -First 1
          Copy-Item $uvExe.FullName "installer/deps/uv.exe"
          Remove-Item "installer/deps/uv.zip", "installer/deps/uv-extract" -Recurse -Force

      - name: Download NSSM
        shell: pwsh
        run: |
          # NSSM 2.24 (stable) — pinned 2026-02-26
          # SHA256 computed from: https://nssm.cc/release/nssm-2.24.zip
          $nssmVersion = "2.24"
          $nssmUrl = "https://nssm.cc/release/nssm-${nssmVersion}.zip"
          $nssmSha256 = "09ddbc5abc1fb5abfd2be27a60462b6c8240f1f921eb70d1199982ddca9c736b"

          New-Item -ItemType Directory -Force -Path installer/nssm | Out-Null
          Write-Host "Downloading NSSM ${nssmVersion}..."
          Invoke-WebRequest -Uri $nssmUrl -OutFile "installer/nssm/nssm.zip"

          $actual = (Get-FileHash -Path "installer/nssm/nssm.zip" -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $nssmSha256) {
            Write-Error "NSSM SHA256 mismatch! Expected: $nssmSha256 | Got: $actual"
            exit 1
          }
          Write-Host "NSSM SHA256 verified OK"

          Expand-Archive -Path "installer/nssm/nssm.zip" -DestinationPath "installer/nssm/extract" -Force
          # nssm.exe is under win64/ inside the zip
          $nssmExe = Get-ChildItem -Path "installer/nssm/extract" -Recurse -Filter "nssm.exe" |
            Where-Object { $_.DirectoryName -match "win64" } |
            Select-Object -First 1
          if (-not $nssmExe) {
            # Fallback: take any nssm.exe found
            $nssmExe = Get-ChildItem -Path "installer/nssm/extract" -Recurse -Filter "nssm.exe" |
              Select-Object -First 1
          }
          if (-not $nssmExe) { throw "nssm.exe not found after extraction" }
          Copy-Item $nssmExe.FullName "installer/nssm/nssm.exe"
          Remove-Item "installer/nssm/nssm.zip", "installer/nssm/extract" -Recurse -Force
          Write-Host "NSSM extracted to installer/nssm/nssm.exe"

      - name: Set version from tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Write-Host "Version: $version"
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: installer/setup.iss
          options: /DMyAppVersion=${{ env.APP_VERSION }}

      - name: Zip extension standalone
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path "extension/dist/*" -DestinationPath "assistant-extension-${tag}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/output/AIHelpdeskAssistant-Setup-*.exe
            assistant-extension-*.zip
          generate_release_notes: true
          body: |
            ## AI Helpdesk Assistant ${{ github.ref_name }}

            ### Downloads
            - **`AIHelpdeskAssistant-Setup-*.exe`** — Full Windows installer (Ollama + backend + extension)
            - **`assistant-extension-*.zip`** — Standalone Edge extension only

            ### Installation (Recommended)
            1. Download and run the `.exe` installer
            2. Follow the wizard — all defaults are fine
            3. Model download (~2.3 GB) will start automatically after install
            4. When prompted, load the extension in Edge: `edge://extensions` → Load unpacked → select the extension folder

            ### Manual Setup
            1. Install [Ollama](https://ollama.com) and pull models: `ollama pull llama3.2:3b && ollama pull nomic-embed-text`
            2. Install [uv](https://docs.astral.sh/uv/): `pip install uv`
            3. Clone the repo and run: `cd backend && uv sync && uv run uvicorn app.main:app --port 8765`
            4. Extract the extension zip and load unpacked in Edge

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.0.1). Bumps manifest.json, pyproject.toml, setup.iss, and CHANGELOG.md header.'
        required: true
        type: string
      installer_type:
        description: 'Installer type to build'
        required: true
        type: choice
        options:
          - online
          - offline
          - both
        default: online
      bump_version:
        description: 'Commit version bump to main before building?'
        required: true
        type: boolean
        default: false
      create_tag:
        description: 'Create and push git tag after version bump?'
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  # Job 0 (optional): Bump version in source files and commit to main
  version-bump:
    name: Version Bump
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.bump_version
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in source files
        run: |
          VERSION="${{ inputs.version }}"
          echo "Bumping version to $VERSION"

          # extension/public/manifest.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" extension/public/manifest.json

          # backend/pyproject.toml (first version = line)
          sed -i "0,/^version = \"[^\"]*\"/s//version = \"$VERSION\"/" backend/pyproject.toml

          # installer/setup.iss (default version define)
          sed -i "s/#define MyAppVersion \"[^\"]*\"/#define MyAppVersion \"$VERSION\"/" installer/setup.iss

          # CHANGELOG.md — add Unreleased → version header if needed
          if grep -q "## \[Unreleased\]" CHANGELOG.md 2>/dev/null; then
            DATE=$(date +%Y-%m-%d)
            sed -i "s/## \[Unreleased\]/## [$VERSION] - $DATE/" CHANGELOG.md
          fi

          echo "Files updated:"
          git diff --stat

      - name: Commit and push version bump
        run: |
          VERSION="${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/public/manifest.json backend/pyproject.toml installer/setup.iss CHANGELOG.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to v$VERSION"
          git push origin main

      - name: Create and push tag
        if: inputs.create_tag
        run: |
          VERSION="${{ inputs.version }}"
          git tag "v$VERSION"
          git push origin "v$VERSION"

  # Job 1: Build the extension on Ubuntu (fast, has Node)
  extension-build:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: [version-bump]
    if: always() && (needs.version-bump.result == 'success' || needs.version-bump.result == 'skipped')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build --workspace=extension
      - run: npm run build:management --workspace=extension

      - name: Upload extension dist
        uses: actions/upload-artifact@v7
        with:
          name: extension-dist
          path: extension/dist/

  # Job 2: Build the Inno Setup installer on Windows
  build-installer:
    name: Build Windows Installer (${{ matrix.type }})
    runs-on: windows-latest
    needs: extension-build
    strategy:
      matrix:
        type: ${{ fromJson(
          inputs.installer_type == 'both' && '["online", "offline"]' ||
          format('["{0}"]', inputs.installer_type)
          ) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Download extension dist
        uses: actions/download-artifact@v8
        with:
          name: extension-dist
          path: extension/dist/

      - name: Resolve version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ inputs.version }}"
          } else {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          }
          Write-Host "Version: $version"
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Cache installer dependencies
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: installer/deps
          key: installer-deps-llama-b8215-cuda124-vulkan-cpu-uv-0.10.6-py-3.13.2-${{ hashFiles('backend/requirements-lock.txt') }}

      - name: Download llama-server CUDA 12.4 build
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # llama.cpp b8215 CUDA 12.4 Windows x64 — optimised for NVIDIA GPUs
          # CUDA 12.4 supports Pascal (GTX 10xx) through current-gen GPUs.
          # CUDA 13 drops Pascal, so we pin to 12.4.
          $llamaTag = "b8215"
          $llamaUrl = "https://github.com/ggml-org/llama.cpp/releases/download/${llamaTag}/llama-${llamaTag}-bin-win-cuda-12.4-x64.zip"
          $cudartUrl = "https://github.com/ggml-org/llama.cpp/releases/download/${llamaTag}/cudart-llama-bin-win-cuda-12.4-x64.zip"

          New-Item -ItemType Directory -Force -Path installer/deps/llama-cuda | Out-Null

          # Download llama-server CUDA build
          Write-Host "Downloading llama-server ${llamaTag} CUDA 12.4..."
          Invoke-WebRequest -Uri $llamaUrl -OutFile "installer/deps/llama-cuda.zip"

          # Download CUDA runtime DLLs (cublas, cudart)
          Write-Host "Downloading CUDA 12.4 runtime..."
          Invoke-WebRequest -Uri $cudartUrl -OutFile "installer/deps/cudart.zip"

          Write-Host "Extracting..."
          Expand-Archive -Path "installer/deps/llama-cuda.zip" -DestinationPath "installer/deps/llama-cuda-extract" -Force
          Expand-Archive -Path "installer/deps/cudart.zip" -DestinationPath "installer/deps/cudart-extract" -Force

          # Copy llama-server.exe and its DLLs
          $serverExe = Get-ChildItem -Path "installer/deps/llama-cuda-extract" -Recurse -Filter "llama-server.exe" | Select-Object -First 1
          if (-not $serverExe) {
            Write-Error "llama-server.exe not found in CUDA archive"
            exit 1
          }
          Copy-Item $serverExe.FullName "installer/deps/llama-cuda/llama-server.exe"
          $binDir = $serverExe.DirectoryName
          Get-ChildItem -Path $binDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "installer/deps/llama-cuda/$($_.Name)"
          }

          # Copy CUDA runtime DLLs (cublas64_12.dll, cublasLt64_12.dll, cudart64_12.dll)
          $cudartDll = Get-ChildItem -Path "installer/deps/cudart-extract" -Recurse -Filter "cublas64_12.dll" | Select-Object -First 1
          if ($cudartDll) {
            Get-ChildItem -Path $cudartDll.DirectoryName -Filter "*.dll" | ForEach-Object {
              Copy-Item $_.FullName "installer/deps/llama-cuda/$($_.Name)" -Force
            }
          } else {
            Write-Error "CUDA runtime DLLs not found in cudart archive"
            exit 1
          }

          Remove-Item "installer/deps/llama-cuda.zip", "installer/deps/cudart.zip", "installer/deps/llama-cuda-extract", "installer/deps/cudart-extract" -Recurse -Force
          $fileCount = (Get-ChildItem -Path "installer/deps/llama-cuda" -Recurse -File).Count
          $totalSize = [math]::Round((Get-ChildItem -Path "installer/deps/llama-cuda" -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "llama-server CUDA 12.4: $fileCount files, $totalSize MB"

      - name: Download llama-server Vulkan build
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # llama.cpp b8215 Vulkan Windows x64 — AMD, Intel Arc, NVIDIA fallback
          $llamaTag = "b8215"
          $vulkanUrl = "https://github.com/ggml-org/llama.cpp/releases/download/${llamaTag}/llama-${llamaTag}-bin-win-vulkan-x64.zip"

          New-Item -ItemType Directory -Force -Path installer/deps/llama-vulkan | Out-Null

          Write-Host "Downloading llama-server ${llamaTag} Vulkan..."
          Invoke-WebRequest -Uri $vulkanUrl -OutFile "installer/deps/llama-vulkan.zip"

          Expand-Archive -Path "installer/deps/llama-vulkan.zip" -DestinationPath "installer/deps/llama-vulkan-extract" -Force

          $serverExe = Get-ChildItem -Path "installer/deps/llama-vulkan-extract" -Recurse -Filter "llama-server.exe" | Select-Object -First 1
          if (-not $serverExe) {
            Write-Error "llama-server.exe not found in Vulkan archive"
            exit 1
          }
          Copy-Item $serverExe.FullName "installer/deps/llama-vulkan/llama-server.exe"
          $binDir = $serverExe.DirectoryName
          Get-ChildItem -Path $binDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "installer/deps/llama-vulkan/$($_.Name)"
          }

          Remove-Item "installer/deps/llama-vulkan.zip", "installer/deps/llama-vulkan-extract" -Recurse -Force
          $fileCount = (Get-ChildItem -Path "installer/deps/llama-vulkan" -Recurse -File).Count
          $totalSize = [math]::Round((Get-ChildItem -Path "installer/deps/llama-vulkan" -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "llama-server Vulkan: $fileCount files, $totalSize MB"

      - name: Download llama-server CPU build
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # llama.cpp b8215 CPU-only Windows x64 — fallback for systems without supported GPU
          $llamaTag = "b8215"
          $cpuUrl = "https://github.com/ggml-org/llama.cpp/releases/download/${llamaTag}/llama-${llamaTag}-bin-win-cpu-x64.zip"

          New-Item -ItemType Directory -Force -Path installer/deps/llama-cpu | Out-Null

          Write-Host "Downloading llama-server ${llamaTag} CPU..."
          Invoke-WebRequest -Uri $cpuUrl -OutFile "installer/deps/llama-cpu.zip"

          Expand-Archive -Path "installer/deps/llama-cpu.zip" -DestinationPath "installer/deps/llama-cpu-extract" -Force

          $serverExe = Get-ChildItem -Path "installer/deps/llama-cpu-extract" -Recurse -Filter "llama-server.exe" | Select-Object -First 1
          if (-not $serverExe) {
            Write-Error "llama-server.exe not found in CPU archive"
            exit 1
          }
          Copy-Item $serverExe.FullName "installer/deps/llama-cpu/llama-server.exe"
          $binDir = $serverExe.DirectoryName
          Get-ChildItem -Path $binDir -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName "installer/deps/llama-cpu/$($_.Name)"
          }

          Remove-Item "installer/deps/llama-cpu.zip", "installer/deps/llama-cpu-extract" -Recurse -Force
          $fileCount = (Get-ChildItem -Path "installer/deps/llama-cpu" -Recurse -File).Count
          $totalSize = [math]::Round((Get-ChildItem -Path "installer/deps/llama-cpu" -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "llama-server CPU: $fileCount files, $totalSize MB"

      - name: Download assistant-tools binary
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # assistant-tools.exe — Rust binary for health check and update commands
          # Hosted on the 'tools' GitHub release
          $toolsUrl = "https://github.com/gyzhoe/assistant-v2/releases/download/tools/assistant-tools.exe"
          Write-Host "Downloading assistant-tools.exe..."
          Invoke-WebRequest -Uri $toolsUrl -OutFile "installer/deps/assistant-tools.exe"
          $size = [math]::Round((Get-Item "installer/deps/assistant-tools.exe").Length / 1MB, 1)
          Write-Host "assistant-tools.exe: $size MB"

      - name: Download uv standalone
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # uv v0.10.6 — pinned 2026-02-26
          # SHA256 sourced from: https://github.com/astral-sh/uv/releases/download/0.10.6/uv-x86_64-pc-windows-msvc.zip.sha256
          $uvVersion = "0.10.6"
          $uvUrl = "https://github.com/astral-sh/uv/releases/download/${uvVersion}/uv-x86_64-pc-windows-msvc.zip"
          $uvSha256 = "b27eb789f281e398a82197477de727fc8faf08605152115686da2c3cba0d25f7"

          Write-Host "Downloading uv ${uvVersion}..."
          Invoke-WebRequest -Uri $uvUrl -OutFile "installer/deps/uv.zip"

          $actual = (Get-FileHash -Path "installer/deps/uv.zip" -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $uvSha256) {
            Write-Error "uv SHA256 mismatch! Expected: $uvSha256 | Got: $actual"
            exit 1
          }
          Write-Host "uv SHA256 verified OK"

          Expand-Archive -Path "installer/deps/uv.zip" -DestinationPath "installer/deps/uv-extract" -Force
          # uv.exe may be nested inside a directory
          $uvExe = Get-ChildItem -Path "installer/deps/uv-extract" -Recurse -Filter "uv.exe" | Select-Object -First 1
          Copy-Item $uvExe.FullName "installer/deps/uv.exe"
          Remove-Item "installer/deps/uv.zip", "installer/deps/uv-extract" -Recurse -Force

      - name: Download Python 3.13 embeddable
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Python 3.13.2 embeddable (win64) for offline backend install
          # SHA256 sourced from: python.org direct download verification
          $pyVersion = "3.13.2"
          $pyUrl = "https://www.python.org/ftp/python/${pyVersion}/python-${pyVersion}-embed-amd64.zip"
          $pySha256 = "1e803610b140cbf69dfa2ceaaeb39651bef75a239c381289e827c30862a27b93"

          New-Item -ItemType Directory -Force -Path installer/deps/python | Out-Null
          Write-Host "Downloading Python ${pyVersion} embeddable..."
          Invoke-WebRequest -Uri $pyUrl -OutFile "installer/deps/python-embed.zip"

          $actual = (Get-FileHash -Path "installer/deps/python-embed.zip" -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $pySha256) {
            Write-Error "Python SHA256 mismatch! Expected: $pySha256 | Got: $actual"
            exit 1
          }
          Write-Host "Python SHA256 verified OK"

          Expand-Archive -Path "installer/deps/python-embed.zip" -DestinationPath "installer/deps/python" -Force
          Remove-Item "installer/deps/python-embed.zip"
          Write-Host "Python embeddable extracted to installer/deps/python/"

      - name: Install Python 3.13 (for tkinter files)
        if: steps.deps-cache.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Add tkinter to embeddable Python
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # The embeddable distribution does not include tkinter, which is needed
          # by pull-models-gui.py. Copy tkinter files from the full Python install
          # provided by actions/setup-python.
          $pythonDir = Split-Path (Get-Command python).Source
          $targetDir = "installer/deps/python"

          # DLLs: _tkinter.pyd, tcl86t.dll, tk86t.dll
          $dllsDir = Join-Path $targetDir "DLLs"
          New-Item -ItemType Directory -Force -Path $dllsDir | Out-Null

          $tkFiles = @("_tkinter.pyd", "tcl86t.dll", "tk86t.dll")
          foreach ($f in $tkFiles) {
            $src = Join-Path $pythonDir "DLLs/$f"
            if (Test-Path $src) {
              Copy-Item $src (Join-Path $dllsDir $f)
              $size = [math]::Round((Get-Item $src).Length / 1KB)
              Write-Host "  Copied $f ($size KB)"
            } else {
              Write-Error "Missing tkinter file: $f"
              exit 1
            }
          }

          # Lib/tkinter/ module
          $tkinterSrc = Join-Path $pythonDir "Lib/tkinter"
          if (Test-Path $tkinterSrc) {
            $libDir = Join-Path $targetDir "Lib"
            New-Item -ItemType Directory -Force -Path $libDir | Out-Null
            Copy-Item -Recurse $tkinterSrc (Join-Path $libDir "tkinter")
            $count = (Get-ChildItem -Recurse (Join-Path $libDir "tkinter") -File).Count
            Write-Host "  Copied Lib/tkinter/ ($count files)"
          } else {
            Write-Error "Missing tkinter Lib directory"
            exit 1
          }

          # tcl/ runtime data (tcl8.6, tk8.6)
          $tclSrc = Join-Path $pythonDir "tcl"
          if (Test-Path $tclSrc) {
            Copy-Item -Recurse $tclSrc (Join-Path $targetDir "tcl")
            $tclSize = [math]::Round((Get-ChildItem -Recurse (Join-Path $targetDir "tcl") -File | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
            Write-Host "  Copied tcl/ runtime ($tclSize MB)"
          } else {
            Write-Error "Missing tcl runtime directory"
            exit 1
          }

          # Update python313._pth to include DLLs and Lib directories
          $pthFile = Join-Path $targetDir "python313._pth"
          if (Test-Path $pthFile) {
            $content = Get-Content $pthFile -Raw
            if ($content -notmatch "DLLs") {
              $content = "./DLLs`n./Lib`n" + $content
              Set-Content -Path $pthFile -Value $content -NoNewline
              Write-Host "  Updated python313._pth with DLLs and Lib paths"
            }
          }

          Write-Host "Tkinter added to embeddable Python successfully"

      - name: Download Python wheels (hash-pinned)
        if: steps.deps-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Pre-download all backend dependencies as wheels for offline install.
          # requirements-lock.txt is generated with hashes via:
          #   uv pip compile --generate-hashes pyproject.toml -o requirements-lock.txt
          New-Item -ItemType Directory -Force -Path installer/deps/wheels | Out-Null
          pip download --require-hashes -r backend/requirements-lock.txt -d installer/deps/wheels --platform win_amd64 --python-version 3.13 --only-binary=:all: 2>&1 | Select-Object -Last 5
          $count = (Get-ChildItem installer/deps/wheels/*.whl).Count
          Write-Host "Downloaded $count wheels (hash-verified) to installer/deps/wheels/"

      - name: Download GGUF models (offline only)
        if: matrix.type == 'offline'
        shell: pwsh
        run: |
          # Download GGUF models for offline installer (~6 GB total)
          New-Item -ItemType Directory -Force -Path installer/deps/models | Out-Null

          # Qwen3.5-9B Q4_K_M (~5.5 GB)
          $qwenUrl = "https://huggingface.co/unsloth/Qwen3.5-9B-GGUF/resolve/main/Qwen3.5-9B-Q4_K_M.gguf"
          Write-Host "Downloading Qwen3.5-9B-Q4_K_M.gguf (~5.5 GB)..."
          Invoke-WebRequest -Uri $qwenUrl -OutFile "installer/deps/models/Qwen3.5-9B-Q4_K_M.gguf"
          $size = [math]::Round((Get-Item "installer/deps/models/Qwen3.5-9B-Q4_K_M.gguf").Length / 1GB, 2)
          Write-Host "Qwen3.5-9B-Q4_K_M.gguf: $size GB"

          # nomic-embed-text v1.5 F16 (~260 MB)
          $nomicUrl = "https://huggingface.co/nomic-ai/nomic-embed-text-v1.5-GGUF/resolve/main/nomic-embed-text-v1.5.f16.gguf"
          Write-Host "Downloading nomic-embed-text-v1.5.f16.gguf (~260 MB)..."
          Invoke-WebRequest -Uri $nomicUrl -OutFile "installer/deps/models/nomic-embed-text-v1.5.f16.gguf"
          $size = [math]::Round((Get-Item "installer/deps/models/nomic-embed-text-v1.5.f16.gguf").Length / 1MB, 1)
          Write-Host "nomic-embed-text-v1.5.f16.gguf: $size MB"

      - name: Compile Inno Setup installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: installer/setup.iss
          options: /DMyAppVersion=${{ env.APP_VERSION }} /DInstallerType=${{ matrix.type }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: installer-${{ matrix.type }}
          path: installer/output/AIHelpdeskAssistant-*-Setup-*.exe

  # Job 3: Create GitHub Release with all artifacts
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-installer, extension-build]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Download all installer artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: installer-*
          path: artifacts/
          merge-multiple: true

      - name: Zip extension standalone
        run: |
          VERSION="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "APP_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Download extension dist
        uses: actions/download-artifact@v8
        with:
          name: extension-dist
          path: extension-dist/

      - name: Create extension zip
        run: |
          cd extension-dist && zip -r "../assistant-extension-v${APP_VERSION}.zip" .

      - name: List release artifacts
        run: |
          echo "=== Installer artifacts ==="
          ls -lh artifacts/ 2>/dev/null || echo "No artifacts found"
          echo "=== Extension zip ==="
          ls -lh assistant-extension-*.zip

      - name: Resolve tag name
        run: echo "TAG_NAME=v${{ inputs.version }}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            artifacts/AIHelpdeskAssistant-*
            assistant-extension-*.zip
          generate_release_notes: true
          body: |
            ## AI Helpdesk Assistant ${{ env.TAG_NAME }}

            ### Downloads
            | File | Description |
            |------|-------------|
            | `AIHelpdeskAssistant-Online-Setup-*.exe` | Online installer (~680 MB) — downloads models via Options page |
            | `AIHelpdeskAssistant-Full-Setup-*.exe` | Offline installer (~6.5 GB) — models bundled |
            | `assistant-extension-*.zip` | Standalone Edge extension only |

            ### GPU Auto-Detection
            The installer automatically detects your GPU and installs the optimal llama-server build:
            | GPU | Backend | Size |
            |-----|---------|------|
            | NVIDIA (Pascal+) | CUDA 12.4 | ~583 MB |
            | AMD / Intel Arc | Vulkan | ~46 MB |
            | No GPU | CPU-only | ~31 MB |

            ### Installation
            1. Download and run the `.exe` installer
            2. Follow the wizard — GPU backend is auto-selected
            3. Load the extension in Edge: `edge://extensions` → Load unpacked → select the extension folder
            4. Open extension Options page to download models (online installer) or they're pre-installed (offline)

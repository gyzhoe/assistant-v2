name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extension-check:
    name: Extension — Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck --workspace=extension

      - name: Lint
        run: npm run lint --workspace=extension

      - name: Unit tests
        run: npm run test --workspace=extension

      - name: Build
        run: npm run build --workspace=extension

      - name: Verify manifest exists
        run: test -f extension/dist/manifest.json

  backend-check:
    name: Backend — Ruff, Mypy, Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy app/ ingestion/

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          OLLAMA_BASE_URL: "http://localhost:11434"
          CHROMA_PATH: "/tmp/test_chroma"
          CORS_ORIGIN: "chrome-extension://test"
          DEFAULT_MODEL: "llama3.2:3b"

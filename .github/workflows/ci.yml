name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  extension-check:
    name: Extension — Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck --workspace=extension

      - name: Lint
        run: npm run lint --workspace=extension

      - name: Unit tests
        run: npm run test --workspace=extension

      - name: Build
        run: npm run build --workspace=extension

      - name: Build management SPA
        run: npm run build:management --workspace=extension

      - name: Verify all manifest paths exist in dist
        run: |
          cd extension/dist
          paths=(
            "manifest.json"
            "background/service-worker.js"
            "content/index.js"
            "src/sidebar/index.html"
            "src/options/index.html"
            "icons/icon16.png"
            "icons/icon48.png"
            "icons/icon128.png"
          )
          missing=0
          for p in "${paths[@]}"; do
            if [ ! -f "$p" ]; then
              echo "MISSING: $p"
              missing=$((missing + 1))
            else
              echo "OK: $p"
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "ERROR: $missing manifest path(s) missing from dist/"
            exit 1
          fi

  backend-check:
    name: Backend — Ruff, Mypy, Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Type check with mypy
        run: uv run mypy app/ ingestion/

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          LLM_BASE_URL: "http://localhost:11435"
          EMBED_BASE_URL: "http://localhost:11436"
          CHROMA_PATH: "/tmp/test_chroma"
          CORS_ORIGIN: "chrome-extension://test"
          DEFAULT_MODEL: "qwen3.5:9b"
